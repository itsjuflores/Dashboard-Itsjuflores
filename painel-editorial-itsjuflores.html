<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Fichário Editorial — @itsjuflores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Fraunces:ital,opsz,wght@1,9..144,500&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cover:#33101A;
    --cover-deep:#210A11;
    --paper:#F2E7D2;
    --paper-soft:#E9DBBE;
    --ink:#2C1B12;
    --ink-soft:#6B5A48;
    --gold:#B8862F;
    --gold-bright:#D4A63B;
    --rose:#A8465A;
    --rose-soft:#C97C88;
    --slate:#5C6B78;
    --slate-soft:#8FA0AC;
    --line: rgba(44,27,18,0.16);
    --shadow: 0 14px 30px -14px rgba(20,6,10,0.45);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 500px at 10% -10%, rgba(212,166,59,0.10), transparent 60%),
      radial-gradient(900px 500px at 100% 0%, rgba(169,70,88,0.14), transparent 55%),
      var(--cover);
    color:var(--ink);
    font-family:'Public Sans', sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:38px 22px 80px;}

  /* ---------- HERO ---------- */
  .hero{
    display:flex; justify-content:space-between; align-items:flex-end; gap:24px;
    padding-bottom:26px; margin-bottom:30px;
    border-bottom:1px solid rgba(242,231,210,0.22);
  }
  .kicker{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:.18em;
    text-transform:uppercase; color:var(--gold-bright); margin:0 0 10px;
  }
  h1.title{
    font-family:'Fraunces', serif; font-weight:600; font-size:44px; line-height:1.02;
    color:var(--paper); margin:0; letter-spacing:-0.01em;
  }
  h1.title em{ font-style:italic; font-weight:500; color:var(--rose-soft); }
  .hero-sub{ color:rgba(242,231,210,0.62); font-size:14.5px; margin-top:10px; max-width:440px; line-height:1.5;}
  .hero-stamp{
    font-family:'IBM Plex Mono', monospace; text-align:right; color:rgba(242,231,210,0.5); font-size:12px;
  }
  .hero-stamp .n{ font-family:'Fraunces', serif; font-size:34px; color:var(--gold-bright); font-weight:600; display:block; line-height:1;}

  /* ---------- STATS ROW ---------- */
  .stats{
    display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:34px;
  }
  .stat-card{
    background:var(--paper); border-radius:3px; padding:16px 18px;
    box-shadow:var(--shadow); position:relative; overflow:hidden;
    border-top:3px solid var(--slate-soft);
  }
  .stat-card.gold{ border-top-color:var(--gold); }
  .stat-card.rose{ border-top-color:var(--rose); }
  .stat-card.ink{ border-top-color:var(--ink); }
  .stat-label{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-soft);}
  .stat-value{ font-family:'Fraunces', serif; font-size:32px; font-weight:600; margin-top:4px; color:var(--ink);}
  .stat-bar{ height:5px; border-radius:3px; background:var(--paper-soft); margin-top:10px; overflow:hidden;}
  .stat-bar > div{ height:100%; background:var(--gold); }

  /* ---------- CONTROLS ---------- */
  .controls{
    display:flex; gap:12px; align-items:center; margin-bottom:22px; flex-wrap:wrap;
  }
  .search{
    flex:1; min-width:220px; background:rgba(242,231,210,0.08);
    border:1px solid rgba(242,231,210,0.25); border-radius:3px; padding:10px 14px;
    color:var(--paper); font-family:'Public Sans',sans-serif; font-size:14px;
  }
  .search::placeholder{ color:rgba(242,231,210,0.4);}
  .search:focus{ outline:none; border-color:var(--gold-bright); }
  .view-toggle{ display:flex; gap:6px; }
  .view-toggle button{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:.05em;
    background:transparent; color:rgba(242,231,210,0.55); border:1px solid rgba(242,231,210,0.25);
    padding:9px 14px; border-radius:3px; cursor:pointer; text-transform:uppercase;
  }
  .view-toggle button.active{ background:var(--gold-bright); border-color:var(--gold-bright); color:var(--cover-deep); font-weight:600;}

  /* ---------- BOARD ---------- */
  .board{ display:grid; grid-template-columns:repeat(3, 1fr); gap:20px; align-items:start;}
  @media (max-width: 880px){ .board{ grid-template-columns:1fr; } .stats{grid-template-columns:repeat(2,1fr);} }

  /* ---------- MODE SWITCH + SUBNAV ---------- */
  .mode-switch{ display:flex; gap:6px; }
  .mode-switch button{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:.05em;
    background:rgba(242,231,210,0.06); color:rgba(242,231,210,0.6); border:1px solid rgba(242,231,210,0.25);
    padding:9px 15px; border-radius:3px; cursor:pointer; text-transform:uppercase;
  }
  .mode-switch button.active{ background:var(--paper); border-color:var(--paper); color:var(--cover-deep); font-weight:600;}

  .new-post-btn{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:.05em; text-transform:uppercase;
    background:var(--gold-bright); border:1px solid var(--gold-bright); color:var(--cover-deep); font-weight:600;
    padding:9px 16px; border-radius:3px; cursor:pointer; white-space:nowrap;
  }
  .new-post-btn:hover{ background:var(--gold); border-color:var(--gold); }

  .subnav{
    display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px;
  }
  .subnav .nav-label{
    font-family:'Fraunces', serif; font-size:20px; color:var(--paper); font-weight:500; text-transform:capitalize;
  }
  .subnav .nav-arrows{ display:flex; gap:6px; }
  .subnav .nav-arrows button{
    background:transparent; border:1px solid rgba(242,231,210,0.3); color:var(--paper);
    width:32px; height:32px; border-radius:3px; cursor:pointer; font-size:14px;
  }
  .subnav .nav-arrows button:hover{ border-color:var(--gold-bright); color:var(--gold-bright); }
  .subnav .nav-today{
    font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em;
    background:transparent; border:1px solid rgba(242,231,210,0.3); color:rgba(242,231,210,0.7);
    padding:0 12px; border-radius:3px; cursor:pointer; height:32px;
  }

  /* ---------- MONTH GRID ---------- */
  .month-grid{
    background:rgba(242,231,210,0.06); border:1px dashed rgba(242,231,210,0.2); border-radius:4px; overflow:hidden;
  }
  .month-dow{ display:grid; grid-template-columns:repeat(7,1fr); }
  .month-dow div{
    font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase;
    color:rgba(242,231,210,0.45); text-align:center; padding:10px 4px; border-bottom:1px solid rgba(242,231,210,0.12);
  }
  .month-rows{ display:grid; grid-auto-rows:minmax(96px,auto); }
  .month-row{ display:grid; grid-template-columns:repeat(7,1fr); }
  .day-cell{
    border-right:1px solid rgba(242,231,210,0.08); border-bottom:1px solid rgba(242,231,210,0.08);
    padding:7px; position:relative; min-height:96px;
  }
  .day-cell.empty{ background:rgba(0,0,0,0.08); }
  .day-num{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:rgba(242,231,210,0.4); }
  .day-cell.has-post .day-num{ color:var(--paper); font-weight:600; }
  .day-chip{
    margin-top:5px; background:var(--paper); border-radius:2px; padding:4px 6px; cursor:pointer;
    font-size:10.5px; color:var(--ink); display:flex; align-items:center; gap:5px; box-shadow:0 3px 8px rgba(0,0,0,0.2);
  }
  .day-chip .dot{ width:6px; height:6px; border-radius:50%; flex:none; }
  .day-chip span.txt{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .day-chip + .day-chip{ margin-top:4px; }

  /* ---------- WEEK STRIP ---------- */
  .week-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:12px; }
  @media (max-width:880px){ .week-grid{ grid-template-columns:1fr; } }
  .week-col{
    background:rgba(242,231,210,0.06); border:1px dashed rgba(242,231,210,0.2); border-radius:4px;
    padding:10px; min-height:220px; display:flex; flex-direction:column; gap:10px;
  }
  .week-col-head{
    font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.08em;
    color:rgba(242,231,210,0.55); text-align:center; padding-bottom:8px; border-bottom:1px solid rgba(242,231,210,0.15);
  }
  .week-col-head .num{ display:block; font-family:'Fraunces',serif; font-size:22px; color:var(--paper); font-weight:600; margin-top:2px; }
  .week-empty{ text-align:center; color:rgba(242,231,210,0.28); font-family:'IBM Plex Mono',monospace; font-size:10.5px; margin-top:10px;}

  .drawer{ position:relative; }
  .drawer-label{
    display:inline-flex; align-items:center; gap:8px;
    font-family:'IBM Plex Mono', monospace; font-size:11.5px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--cover-deep); background:var(--paper);
    padding:8px 14px 8px 12px; border-radius:2px 2px 0 0;
    box-shadow:var(--shadow);
  }
  .drawer-label .dot{ width:8px; height:8px; border-radius:50%; display:inline-block;}
  .drawer-count{ margin-left:auto; opacity:.55; }
  .drawer-body{
    background:rgba(242,231,210,0.06); border:1px dashed rgba(242,231,210,0.2);
    border-radius:0 4px 4px 4px; padding:14px; min-height:120px;
    display:flex; flex-direction:column; gap:14px;
  }

  /* ---------- CARD ---------- */
  .card{
    background:var(--paper); border-radius:3px; box-shadow:var(--shadow);
    position:relative; overflow:hidden; cursor:pointer;
    transition:transform .15s ease;
    border:1px solid rgba(44,27,18,0.06);
  }
  .card:hover{ transform:translateY(-3px); }
  .card-id{
    position:absolute; top:8px; left:10px; font-family:'IBM Plex Mono',monospace;
    font-size:10px; color:rgba(44,27,18,0.38); letter-spacing:.05em; z-index:2;
  }
  .card-media{
    width:100%; aspect-ratio:4/3; background:var(--paper-soft);
    display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;
  }
  .card-media img{ width:100%; height:100%; object-fit:cover; display:block;}
  .no-art{ text-align:center; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace; font-size:11px; padding:0 18px;}
  .no-art .glyph{ font-family:'Fraunces',serif; font-size:30px; color:var(--slate-soft); display:block; margin-bottom:6px; font-style:italic;}

  .stamp{
    position:absolute; top:10px; right:10px; z-index:3;
    font-family:'IBM Plex Mono', monospace; font-size:9.5px; letter-spacing:.09em; text-transform:uppercase;
    padding:4px 9px; border-radius:2px; transform:rotate(3deg);
    border:1.5px solid currentColor; font-weight:600;
    box-shadow:0 2px 6px rgba(0,0,0,0.15);
  }
  .stamp.st-postado{ color:#2E5B3C; background:rgba(46,91,60,0.10);}
  .stamp.st-postar{ color:var(--gold); background:rgba(184,134,47,0.12);}
  .stamp.st-fazer{ color:var(--rose); background:rgba(168,70,90,0.10);}

  .card-body{ padding:14px 14px 16px; }
  .card-date{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft); margin-bottom:6px; display:flex; justify-content:space-between;}
  .card-preview{ font-size:13.5px; line-height:1.45; color:var(--ink); min-height:38px;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;}
  .card-preview.empty{ color:var(--ink-soft); font-style:italic; }
  .card-tags{ margin-top:10px; display:flex; flex-wrap:wrap; gap:5px;}
  .tag{ font-family:'IBM Plex Mono',monospace; font-size:9.5px; color:var(--slate); background:rgba(92,107,120,0.09); padding:2px 6px; border-radius:2px;}

  .card-footer{
    border-top:1px solid var(--line); padding:10px 14px; display:flex; justify-content:space-between; align-items:center; gap:8px;
  }
  select.status-select{
    font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.03em;
    border:1px solid var(--line); background:transparent; color:var(--ink);
    padding:5px 6px; border-radius:2px; cursor:pointer;
  }
  .expand-hint{ font-size:11px; color:var(--ink-soft); }

  /* ---------- MODAL ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(16,5,8,0.72); display:none;
    align-items:center; justify-content:center; z-index:50; padding:24px;
    backdrop-filter: blur(2px);
  }
  .overlay.open{ display:flex; }
  .modal{
    background:var(--paper); max-width:760px; width:100%; max-height:86vh; overflow-y:auto;
    border-radius:4px; box-shadow:0 30px 70px rgba(0,0,0,0.5); position:relative;
  }
  .modal-inner{ display:grid; grid-template-columns:280px 1fr; gap:0; }
  @media (max-width:640px){ .modal-inner{ grid-template-columns:1fr; } }
  .modal-media{ background:var(--paper-soft); position:relative; }
  .modal-media img{ width:100%; display:block; }
  .modal-media .no-art{ padding:60px 20px; }
  .upload-target{ display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; min-height:220px; }
  .upload-target:hover{ background:rgba(184,134,47,0.08); }
  .upload-hint{ font-size:10px; color:var(--slate); margin-top:4px; display:block; }
  .art-replace{
    position:absolute; bottom:10px; right:10px; background:rgba(44,27,18,0.75); color:var(--paper);
    font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.05em; text-transform:uppercase;
    padding:6px 10px; border-radius:3px; cursor:pointer;
  }
  .art-replace:hover{ background:var(--rose); }
  .upload-status{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--gold); margin-top:10px; min-height:14px; }
  .modal-content{ padding:24px 26px; }
  .modal-close{
    position:absolute; top:12px; right:14px; background:var(--cover); color:var(--paper);
    border:none; width:28px; height:28px; border-radius:50%; cursor:pointer; font-size:15px; z-index:5;
  }
  .modal-date{ font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft); margin-bottom:10px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .date-input{
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink); background:rgba(255,255,255,0.4);
    border:1px solid var(--line); border-radius:3px; padding:3px 6px; cursor:pointer;
  }
  .legenda-edit{
    width:100%; font-family:'Public Sans',sans-serif; font-size:14.5px; line-height:1.6; color:var(--ink);
    border:1px solid var(--line); border-radius:3px; padding:10px 12px; min-height:200px; resize:vertical;
    background:rgba(255,255,255,0.35); margin-bottom:14px;
  }
  .modal-caption{ font-size:14.5px; line-height:1.65; white-space:pre-wrap; color:var(--ink); margin-bottom:16px;}
  .modal-caption.empty{ font-style:italic; color:var(--ink-soft); }
  .modal-tags{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px;}
  .modal-row{ display:flex; align-items:center; gap:10px; margin-top:14px;}
  .modal-row label{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); width:110px;}
  textarea.notes{
    width:100%; font-family:'Public Sans',sans-serif; font-size:13px; border:1px solid var(--line);
    border-radius:3px; padding:8px 10px; resize:vertical; min-height:56px; color:var(--ink); background:rgba(255,255,255,0.35);
  }
  .copy-btn{
    font-family:'IBM Plex Mono',monospace; font-size:11px; background:var(--cover); color:var(--paper);
    border:none; padding:8px 14px; border-radius:3px; cursor:pointer; letter-spacing:.04em;
  }
  .copy-btn:hover{ background:var(--rose); }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background:rgba(44,27,18,0.25); border-radius:4px;}
</style>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <div>
      <p class="kicker">Fichário de Conteúdo</p>
      <h1 class="title">@itsjuflores <em>— painel editorial</em></h1>
      <p class="hero-sub">Cada card é uma ficha de post: a arte, a legenda e o status, num só lugar. Clique num card para abrir a ficha completa.</p>
    </div>
    <div class="hero-stamp">
      <span class="n" id="statTotal">12</span>
      posts no calendário
    </div>
  </div>

  <div class="stats">
    <div class="stat-card ink">
      <div class="stat-label">Publicados</div>
      <div class="stat-value" id="statPublicados">0</div>
      <div class="stat-bar"><div id="barPublicados" style="width:0%"></div></div>
    </div>
    <div class="stat-card gold">
      <div class="stat-label">Prontos p/ postar</div>
      <div class="stat-value" id="statPostar">0</div>
      <div class="stat-bar"><div id="barPostar" style="width:0%; background:var(--gold);"></div></div>
    </div>
    <div class="stat-card rose">
      <div class="stat-label">Pendente de arte</div>
      <div class="stat-value" id="statFazer">0</div>
      <div class="stat-bar"><div id="barFazer" style="width:0%; background:var(--rose);"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Sem legenda ainda</div>
      <div class="stat-value" id="statSemLegenda">0</div>
      <div class="stat-bar"><div id="barSemLegenda" style="width:0%; background:var(--slate);"></div></div>
    </div>
  </div>

  <div class="controls">
    <input class="search" id="searchBox" placeholder="Buscar por autora, hashtag ou palavra na legenda…" />
    <div class="mode-switch" id="modeSwitch">
      <button data-mode="kanban" class="active">Fichas</button>
      <button data-mode="week">Semana</button>
      <button data-mode="month">Mês</button>
    </div>
    <button class="new-post-btn" id="newPostBtn">+ Nova ficha</button>
  </div>

  <div class="controls" id="statusFilterRow">
    <div class="view-toggle" id="viewToggle">
      <button data-f="all" class="active">Todos</button>
      <button data-f="Postado">Postado</button>
      <button data-f="Postar">Postar</button>
      <button data-f="A fazer">A fazer</button>
    </div>
  </div>

  <div class="subnav" id="subnav" style="display:none;">
    <div class="nav-arrows"><button id="navPrev">←</button></div>
    <div class="nav-label" id="navLabel"></div>
    <div style="display:flex; gap:8px;">
      <button class="nav-today" id="navToday">hoje</button>
      <div class="nav-arrows"><button id="navNext">→</button></div>
    </div>
  </div>

  <div class="board" id="board"></div>
  <div class="month-grid" id="monthGrid" style="display:none;"></div>
  <div class="week-grid" id="weekGrid" style="display:none;"></div>

</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-inner" id="modalInner"></div>
  </div>
</div>

<script>
const RAW_POSTS = [{"date": "13/07/2026", "status": "Postado", "legenda": "💗📚 Às vezes, releituras só confirmam o que a gente já sentia.\n\nEu li \"Lugar Feliz\" há cerca de dois anos e lembro de ter dado uma nota bem abaixo dos outros livros da Emily Henry. Como amo a autora, sempre fiquei com aquela sensação de que talvez eu só não tivesse lido na fase certa da vida.\n\nEntão resolvi reler.\nE, dessa vez, entendi exatamente por que esse livro não funciona para mim.\n\nHarriet e Wyn são aquele casal que todo mundo ama. Eles têm história, intimidade e uma química construída ao longo de anos. Mas, durante toda a leitura, eu senti que o relacionamento deles era movido muito mais pelo apego do que pelo amor.\n\nO trope de ex-namorados que ainda se amam simplesmente não conversa comigo. Em vez de torcer pelo casal, eu me perguntava se eles realmente deveriam voltar ou se estavam apenas presos ao que um dia viveram.\n\nNão acho que seja um livro ruim. Muito pelo contrário. Entendo perfeitamente por que tantas pessoas se emocionam com essa história.\nSó que, para mim, ele nunca despertou o que os outros livros da Emily Henry despertam.\n\n\"Leitura de Verão\", \"Loucos por Livros\", \"Pessoas que Conhecemos nas Férias\"… todos eles me tocaram em camadas muito mais profundas, me fizeram rir, suspirar e sentir saudade quando terminaram.\n\nJá \"Lugar Feliz\" nunca conseguiu criar essa conexão.\nNa minha primeira leitura, achei que fosse uma questão de idade ou momento de vida. Hoje percebo que não. Simplesmente é um livro que não foi escrito para mim, e tudo bem.\n\nNem todo livro de um autor favorito vai virar favorito também. 🤍\n⭐ 3/5\n\nSalva esse post se você também tem um livro \"errado\" de um autor favorito, e manda pra aquela amiga que vai discordar de mim na certa 😂\n\nE vocês? \"Lugar Feliz\" conquistou vocês ou também foi o livro da Emily Henry que menos funcionou? 💭📖\n\n#EmilyHenry #LugarFeliz #ResenhaLiteraria #RomanceContemporâneo #BookstagramBrasil", "image": function parseDateStr(str){
  const [d,m,y] = str.split('/').map(Number);
  return new Date(y, m-1, d);
}
function dateKey(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function startOfWeek(d){
  const nd = new Date(d);
  nd.setHours(0,0,0,0);
  nd.setDate(nd.getDate() - nd.getDay());
  return nd;
}
function addDays(d, n){ const nd = new Date(d); nd.setDate(nd.getDate()+n); return nd; }
function fmtShort(d){ return d.toLocaleDateString('pt-BR', {day:'2-digit', month:'short'}).replace('.',''); }

const anchorDate = parseDateStr(posts[0].date);
let monthCursor = new Date(anchorDate.getFullYear(), anchorDate.getMonth(), 1);
let weekCursor = startOfWeek(anchorDate);

async function loadState(){
  try{
    const res = await window.storage.get('itsjuflores-posts-full', false);
    if(res && res.value){
      posts = JSON.parse(res.value);
    } else {
      await saveState();
    }
  }catch(e){
    /* nothing saved yet — keep the built-in posts and create the first snapshot */
    await saveState();
  }
  render();
}

async function saveState(){
  try{
    await window.storage.set('itsjuflores-posts-full', JSON.stringify(posts), false);
  }catch(e){
    console.error("erro ao salvar", e);
    alert("Essa arte pode ser grande demais pra salvar. Tenta uma imagem menor.");
  }
}

function updateDerivedFields(p){
  p.hashtags = p.legenda.match(/#\w+/g) || [];
  const body = p.legenda ? p.legenda.split("\n\n")[0].trim() : "";
  p.preview = body.slice(0,140);
}

function nextPostId(){
  return posts.length ? Math.max(...posts.map(p=>p.id)) + 1 : 1;
}

function todayDDMMYYYY(){
  const d = new Date();
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

function toISODate(ddmmyyyy){
  if(!ddmmyyyy) return "";
  const [d,m,y] = ddmmyyyy.split('/');
  if(!d||!m||!y) return "";
  return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
}
function fromISODate(iso){
  if(!iso) return "";
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function createPost(){
  const newPost = {
    id: nextPostId(),
    date: todayDDMMYYYY(),
    status: "A fazer",
    legenda: "",
    hashtags: [],
    preview: "",
    image: null,
    notes: ""
  };
  posts.push(newPost);
  saveState();
  render();
  openModal(newPost.id);
}

function processImageFile(file, onDone, onError){
  const reader = new FileReader();
  reader.onerror = () => onError && onError(reader.error);
  reader.onload = (ev) => {
    const img = new Image();
    img.onerror = () => onError && onError(new Error("imagem inválida"));
    img.onload = () => {
      const maxW = 900;
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      onDone(dataUrl);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function escapeHtml(s){
  return (s||"").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}

function renderStats(){
  const total = posts.length;
  const publicados = posts.filter(p=>p.status==="Postado").length;
  const postar = posts.filter(p=>p.status==="Postar").length;
  const fazer = posts.filter(p=>p.status==="A fazer").length;
  const semLegenda = posts.filter(p=>!p.legenda || !p.legenda.trim()).length;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statPublicados').textContent = publicados;
  document.getElementById('statPostar').textContent = postar;
  document.getElementById('statFazer').textContent = fazer;
  document.getElementById('statSemLegenda').textContent = semLegenda;

  document.getElementById('barPublicados').style.width = (total? publicados/total*100:0)+"%";
  document.getElementById('barPostar').style.width = (total? postar/total*100:0)+"%";
  document.getElementById('barFazer').style.width = (total? fazer/total*100:0)+"%";
  document.getElementById('barSemLegenda').style.width = (total? semLegenda/total*100:0)+"%";
}

function matchesSearch(p, q){
  if(!q) return true;
  const hay = (p.legenda + " " + p.date + " " + (p.hashtags||[]).join(" ")).toLowerCase();
  return hay.includes(q.toLowerCase());
}

function cardHTML(p){
  const meta = STATUS_META[p.status] || STATUS_META["A fazer"];
  const mediaHTML = p.image
    ? `<img src="${p.image}" alt="Arte do post ${p.date}" loading="lazy"/>`
    : `<div class="no-art"><span class="glyph">✎</span>sem arte ainda<br><span class="upload-hint">abrir ficha p/ enviar</span></div>`;
  const previewText = p.legenda ? escapeHtml(p.preview) + (p.legenda.length>140?"…":"") : "Legenda ainda não escrita.";
  const tags = (p.hashtags||[]).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join("");

  return `
  <div class="card" data-id="${p.id}">
    <span class="card-id">Nº ${String(p.id).padStart(2,'0')}</span>
    <div class="card-media">
      <span class="stamp ${meta.cls}">${meta.label}</span>
      ${mediaHTML}
    </div>
    <div class="card-body">
      <div class="card-date"><span>${p.date}</span></div>
      <div class="card-preview ${p.legenda?'':'empty'}">${previewText}</div>
      <div class="card-tags">${tags}</div>
    </div>
    <div class="card-footer">
      <select class="status-select" data-id="${p.id}">
        ${Object.keys(STATUS_META).map(s=>`<option value="${s}" ${s===p.status?'selected':''}>${s}</option>`).join("")}
      </select>
      <span class="expand-hint">abrir ficha →</span>
    </div>
  </div>`;
}

function bindCardEvents(container){
  container.querySelectorAll('.card').forEach(el=>{
    el.addEventListener('click', (e)=>{
      if(e.target.closest('select')) return;
      openModal(parseInt(el.dataset.id));
    });
  });
  container.querySelectorAll('.status-select').forEach(el=>{
    el.addEventListener('change', (e)=>{
      const id = parseInt(el.dataset.id);
      const post = posts.find(p=>p.id===id);
      post.status = el.value;
      saveState();
      render();
    });
  });
}

function renderKanban(){
  const board = document.getElementById('board');
  const columns = [
    {key:"A fazer", label:"A fazer", dot:"#A8465A"},
    {key:"Postar", label:"Pronto p/ postar", dot:"#B8862F"},
    {key:"Postado", label:"Postado", dot:"#2E5B3C"},
  ];

  board.innerHTML = columns.map(col => {
    const items = posts
      .filter(p => currentFilter==="all" || currentFilter===col.key)
      .filter(p => p.status === col.key)
      .filter(p => matchesSearch(p, currentSearch));
    if(currentFilter !== "all" && currentFilter !== col.key) return "";
    return `
    <div class="drawer">
      <div class="drawer-label"><span class="dot" style="background:${col.dot}"></span>${col.label}<span class="drawer-count">${items.length}</span></div>
      <div class="drawer-body">
        ${items.length ? items.map(cardHTML).join("") : `<div style="color:rgba(242,231,210,0.35); font-family:'IBM Plex Mono',monospace; font-size:12px; text-align:center; padding:20px 0;">— vazio —</div>`}
      </div>
    </div>`;
  }).join("");

  bindCardEvents(board);
}

function renderMonth(){
  const grid = document.getElementById('monthGrid');
  const year = monthCursor.getFullYear(), month = monthCursor.getMonth();
  const firstDay = new Date(year, month, 1);
  const startOffset = firstDay.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const totalCells = Math.ceil((startOffset + daysInMonth)/7)*7;

  const byKey = {};
  posts.filter(p=>matchesSearch(p, currentSearch)).forEach(p=>{
    const k = dateKey(parseDateStr(p.date));
    (byKey[k] = byKey[k]||[]).push(p);
  });

  const cellsArr = [];
  for(let i=0;i<totalCells;i++){
    const dayNum = i - startOffset + 1;
    if(dayNum < 1 || dayNum > daysInMonth){
      cellsArr.push(`<div class="day-cell empty"></div>`);
      continue;
    }
    const d = new Date(year, month, dayNum);
    const k = dateKey(d);
    const items = byKey[k] || [];
    const chips = items.map(p=>{
      const meta = STATUS_META[p.status];
      const label = p.legenda ? escapeHtml(p.preview.slice(0,22)) : "rascunho pendente";
      return `<div class="day-chip" data-id="${p.id}"><span class="dot" style="background:${meta.dot}"></span><span class="txt">${label}</span></div>`;
    }).join("");
    cellsArr.push(`<div class="day-cell ${items.length?'has-post':''}"><div class="day-num">${dayNum}</div>${chips}</div>`);
  }

  const numRows = totalCells/7;
  let rowsHTML = "";
  for(let r=0;r<numRows;r++){
    rowsHTML += `<div class="month-row">${cellsArr.slice(r*7,(r+1)*7).join("")}</div>`;
  }

  grid.innerHTML = `
    <div class="month-dow">${DOW.map(d=>`<div>${d}</div>`).join("")}</div>
    <div class="month-rows" style="grid-template-rows:repeat(${numRows}, 1fr);">
      ${rowsHTML}
    </div>`;

  grid.querySelectorAll('.day-chip').forEach(el=>{
    el.addEventListener('click', ()=> openModal(parseInt(el.dataset.id)));
  });

  document.getElementById('navLabel').textContent =
    monthCursor.toLocaleDateString('pt-BR', {month:'long', year:'numeric'});
}

function renderWeek(){
  const grid = document.getElementById('weekGrid');
  const days = Array.from({length:7}).map((_,i)=> addDays(weekCursor, i));

  const byKey = {};
  posts.filter(p=>matchesSearch(p, currentSearch)).forEach(p=>{
    const k = dateKey(parseDateStr(p.date));
    (byKey[k] = byKey[k]||[]).push(p);
  });

  grid.innerHTML = days.map(d=>{
    const k = dateKey(d);
    const items = byKey[k] || [];
    return `
    <div class="week-col">
      <div class="week-col-head">${DOW[d.getDay()]}<span class="num">${d.getDate()}</span></div>
      ${items.length ? items.map(cardHTML).join("") : `<div class="week-empty">— sem post —</div>`}
    </div>`;
  }).join("");

  bindCardEvents(grid);

  const rangeLabel = `${fmtShort(days[0])} – ${fmtShort(days[6])}, ${days[6].getFullYear()}`;
  document.getElementById('navLabel').textContent = rangeLabel;
}

function render(){
  renderStats();
  const board = document.getElementById('board');
  const monthGrid = document.getElementById('monthGrid');
  const weekGrid = document.getElementById('weekGrid');
  const subnav = document.getElementById('subnav');
  const statusFilterRow = document.getElementById('statusFilterRow');

  board.style.display = currentViewMode==='kanban' ? 'grid' : 'none';
  monthGrid.style.display = currentViewMode==='month' ? 'block' : 'none';
  weekGrid.style.display = currentViewMode==='week' ? 'grid' : 'none';
  subnav.style.display = currentViewMode==='kanban' ? 'none' : 'flex';
  statusFilterRow.style.display = currentViewMode==='kanban' ? 'flex' : 'none';

  if(currentViewMode==='kanban') renderKanban();
  else if(currentViewMode==='month') renderMonth();
  else if(currentViewMode==='week') renderWeek();
}

function openModal(id){
  const p = posts.find(x=>x.id===id);
  const meta = STATUS_META[p.status];
  const mediaHTML = p.image
    ? `<img src="${p.image}" alt="Arte do post ${p.date}"/>
       <label class="art-replace" for="artUpload">trocar arte</label>`
    : `<label class="no-art upload-target" for="artUpload"><span class="glyph">✎</span>sem arte ainda<br><span class="upload-hint">clique para enviar</span></label>`;
  const tags = (p.hashtags||[]).map(t=>`<span class="tag">${t}</span>`).join("");

  document.getElementById('modalInner').innerHTML = `
    <div class="modal-media">
      ${mediaHTML}
      <input type="file" accept="image/*" id="artUpload" style="display:none;" />
    </div>
    <div class="modal-content">
      <div class="modal-date">
        Ficha Nº ${String(p.id).padStart(2,'0')} ·
        <input type="date" id="modalDate" class="date-input" value="${toISODate(p.date)}" />
        <span class="stamp ${meta.cls}" style="position:static; transform:none; display:inline-block; margin-left:4px;">${meta.label}</span>
      </div>
      <textarea class="legenda-edit" id="modalLegenda" placeholder="Escreva a legenda do post aqui...">${escapeHtml(p.legenda||"")}</textarea>
      <div class="modal-tags" id="modalTags">${tags}</div>

      <div class="modal-row">
        <label>Status</label>
        <select class="status-select" data-id="${p.id}" id="modalStatus">
          ${Object.keys(STATUS_META).map(s=>`<option value="${s}" ${s===p.status?'selected':''}>${s}</option>`).join("")}
        </select>
      </div>
      <div class="modal-row" style="align-items:flex-start;">
        <label style="margin-top:8px;">Notas</label>
        <textarea class="notes" id="modalNotes" placeholder="ex.: aguardando confirmação da autora, testar novo horário...">${escapeHtml(p.notes||"")}</textarea>
      </div>
      <div class="modal-row">
        <label></label>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          ${p.legenda ? `<button class="copy-btn" id="copyBtn">Copiar legenda</button>` : ""}
          ${p.image ? `<button class="copy-btn" id="removeArtBtn" style="background:var(--rose);">Remover arte</button>` : ""}
          <button class="copy-btn" id="deleteBtn" style="background:var(--slate);">Excluir ficha</button>
        </div>
      </div>
      <div id="uploadStatus" class="upload-status"></div>
    </div>
  `;

  document.getElementById('modalDate').addEventListener('change', (e)=>{
    if(!e.target.value) return;
    p.date = fromISODate(e.target.value);
    saveState();
    render();
    openModal(id);
  });
  document.getElementById('modalLegenda').addEventListener('blur', (e)=>{
    p.legenda = e.target.value;
    updateDerivedFields(p);
    saveState();
    render();
    openModal(id);
  });
  document.getElementById('modalStatus').addEventListener('change', (e)=>{
    p.status = e.target.value;
    saveState();
    render();
    openModal(id);
  });
  document.getElementById('modalNotes').addEventListener('blur', (e)=>{
    p.notes = e.target.value;
    saveState();
  });
  const copyBtn = document.getElementById('copyBtn');
  if(copyBtn){
    copyBtn.addEventListener('click', ()=>{
      navigator.clipboard?.writeText(p.legenda);
      copyBtn.textContent = "Copiado!";
      setTimeout(()=>copyBtn.textContent="Copiar legenda", 1400);
    });
  }
  const removeArtBtn = document.getElementById('removeArtBtn');
  if(removeArtBtn){
    removeArtBtn.addEventListener('click', ()=>{
      p.image = null;
      saveState();
      render();
      openModal(id);
    });
  }

  const artUpload = document.getElementById('artUpload');
  artUpload.addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const statusEl = document.getElementById('uploadStatus');
    statusEl.textContent = "enviando arte…";
    processImageFile(file, (dataUrl)=>{
      p.image = dataUrl;
      saveState();
      render();
      openModal(id);
    }, (err)=>{
      statusEl.textContent = "não deu pra ler essa imagem, tenta outro arquivo.";
      console.error(err);
    });
  });

  document.getElementById('deleteBtn').addEventListener('click', ()=>{
    if(confirm('Excluir esta ficha? Essa ação não pode ser desfeita.')){
      posts = posts.filter(x=>x.id!==id);
      saveState();
      document.getElementById('overlay').classList.remove('open');
      render();
    }
  });

  document.getElementById('overlay').classList.add('open');
}

document.getElementById('modalClose').addEventListener('click', ()=>{
  document.getElementById('overlay').classList.remove('open');
});
document.getElementById('overlay').addEventListener('click', (e)=>{
  if(e.target.id==='overlay') document.getElementById('overlay').classList.remove('open');
});

document.getElementById('searchBox').addEventListener('input', (e)=>{
  currentSearch = e.target.value;
  render();
});
document.getElementById('viewToggle').addEventListener('click', (e)=>{
  const btn = e.target.closest('button');
  if(!btn) return;
  document.querySelectorAll('.view-toggle button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.f;
  render();
});

document.getElementById('newPostBtn').addEventListener('click', ()=>{
  createPost();
});

document.getElementById('modeSwitch').addEventListener('click', (e)=>{
  const btn = e.target.closest('button');
  if(!btn) return;
  document.querySelectorAll('.mode-switch button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentViewMode = btn.dataset.mode;
  render();
});

document.getElementById('navPrev').addEventListener('click', ()=>{
  if(currentViewMode==='month'){ monthCursor = new Date(monthCursor.getFullYear(), monthCursor.getMonth()-1, 1); }
  else if(currentViewMode==='week'){ weekCursor = addDays(weekCursor, -7); }
  render();
});
document.getElementById('navNext').addEventListener('click', ()=>{
  if(currentViewMode==='month'){ monthCursor = new Date(monthCursor.getFullYear(), monthCursor.getMonth()+1, 1); }
  else if(currentViewMode==='week'){ weekCursor = addDays(weekCursor, 7); }
  render();
});
document.getElementById('navToday').addEventListener('click', ()=>{
  const today = new Date();
  if(currentViewMode==='month'){ monthCursor = new Date(today.getFullYear(), today.getMonth(), 1); }
  else if(currentViewMode==='week'){ weekCursor = startOfWeek(today); }
  render();
});

loadState();
</script>
</body>
</html>
